<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Engine Room — Math Workbench</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#02060b;
  --panel:#071522;
  --panel2:#0b2033;
  --line:#16425c;
  --text:#e6f8ff;
  --muted:#9bb5c7;
  --cyan:#7ee7ff;
  --green:#7dff9b;
  --yellow:#ffd86b;
  --red:#ff7373;
  --orange:#ffae5d;
  --purple:#c9a7ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:
    radial-gradient(circle at 10% 0%, rgba(0,220,255,.15), transparent 30%),
    radial-gradient(circle at 90% 20%, rgba(130,90,255,.12), transparent 30%),
    linear-gradient(180deg,#02060b,#050b12 45%,#010409);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.wrap{
  max-width:1300px;
  margin:auto;
  padding:14px;
}

h1{
  margin:8px 0 4px;
  color:var(--cyan);
  font-size:26px;
}

.sub{
  color:var(--muted);
  font-size:13px;
  margin-bottom:14px;
}

.panel{
  background:rgba(7,21,34,.94);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  box-shadow:0 0 24px rgba(0,200,255,.08);
  margin-bottom:12px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

input, select, button{
  border:1px solid #1f6f94;
  background:#020812;
  color:var(--text);
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

button{
  background:#07344c;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#0b5174;
}

.btn-main{
  background:#075f7b;
  border-color:#45dfff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

@media(max-width:1000px){
  .grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:650px){
  .grid{grid-template-columns:1fr}
}

.card{
  background:#06131f;
  border:1px solid #12384f;
  border-radius:14px;
  padding:12px;
  min-height:140px;
}

.card h3{
  margin:0 0 6px;
  color:#bdf3ff;
  font-size:16px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  border:1px solid #234d66;
  margin:2px 4px 2px 0;
}

.toy{color:var(--purple)}
.scan{color:var(--cyan)}
.cert{color:var(--green)}
.proof{color:var(--orange)}
.open{color:var(--yellow)}
.fail{color:var(--red)}
.pass{color:var(--green)}
.muted{color:var(--muted)}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  border-bottom:1px solid #12384f;
  padding:8px;
  text-align:left;
  vertical-align:top;
}

th{
  color:#9be9ff;
  background:#06111d;
  position:sticky;
  top:0;
}

.scroll{
  max-height:440px;
  overflow:auto;
  border:1px solid #102f44;
  border-radius:12px;
}

pre{
  background:#020812;
  border:1px solid #12384f;
  border-radius:12px;
  padding:10px;
  overflow:auto;
  max-height:360px;
  font-size:12px;
}

.small{
  color:var(--muted);
  font-size:12px;
}

.bar{
  height:8px;
  background:#06101a;
  border:1px solid #153e56;
  border-radius:999px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#26d9ff,#7dff9b);
  transition:.25s;
}

.engine-title{
  color:var(--cyan);
  font-weight:bold;
}
</style>
</head>

<body>
<div class="wrap">

<h1>Engine Room</h1>
<div class="sub">
  Master list of your current math workbench engines. This does not prove the conjectures.
  It organizes the tools by level: toy, scan, certificate, proof-critical.
</div>

<div class="panel">
  <div class="controls">
    <input id="searchBox" placeholder="Search engine..." oninput="render()" />

    <select id="familyFilter" onchange="render()">
      <option value="ALL">All Families</option>
      <option value="Collatz Path">Collatz Path</option>
      <option value="Collatz Certificate">Collatz Certificate</option>
      <option value="Five Conjecture">Five Conjecture</option>
      <option value="Goldbach">Goldbach</option>
      <option value="Visual App">Visual App</option>
    </select>

    <select id="levelFilter" onchange="render()">
      <option value="ALL">All Levels</option>
      <option value="Toy">Toy</option>
      <option value="Scanner">Scanner</option>
      <option value="Certificate">Certificate</option>
      <option value="Proof-Critical">Proof-Critical</option>
      <option value="Open">Open</option>
    </select>

    <button class="btn-main" onclick="runAudit()">Run Engine Audit</button>
    <button onclick="exportJSON()">Export Engine List</button>
    <button onclick="copySummary()">Copy Summary</button>
  </div>
</div>

<div class="grid" id="cards"></div>

<div class="panel">
  <h2>Engine Table</h2>
  <div class="scroll">
    <table>
      <thead>
        <tr>
          <th>Engine</th>
          <th>Family</th>
          <th>Level</th>
          <th>Status</th>
          <th>What it does</th>
          <th>Next action</th>
        </tr>
      </thead>
      <tbody id="engineBody"></tbody>
    </table>
  </div>
</div>

<div class="panel">
  <h2>Audit Output</h2>
  <pre id="auditOut">Click Run Engine Audit...</pre>
</div>

</div>

function render(){
  const q = document.getElementById("searchBox").value.toLowerCase().trim();
  const fam = document.getElementById("familyFilter").value;
  const lvl = document.getElementById("levelFilter").value;

  const list = ENGINES.filter(e => {
    const text = `${e.name} ${e.family} ${e.level} ${e.status} ${e.does} ${e.next}`.toLowerCase();
    if(q && !text.includes(q)) return false;
    if(fam !== "ALL" && e.family !== fam) return false;
    if(lvl !== "ALL" && e.level !== lvl) return false;
    return true;
  });

  renderCards(list);
  renderTable(list);
}

function renderCards(list){
  const cards = document.getElementById("cards");
  const total = list.length;
  const pass = list.filter(e=>e.status==="PASS").length;
  const open = list.filter(e=>e.status==="OPEN").length;
  const proof = list.filter(e=>e.level==="Proof-Critical").length;
  const cert = list.filter(e=>e.level==="Certificate").length;

  const data = [
    {title:"Visible Engines", value:total, label:"currently shown", cls:"scan", pct:100},
    {title:"PASS", value:pass, label:"working / stable", cls:"pass", pct:total ? pass/total*100 : 0},
    {title:"OPEN", value:open, label:"needs definition/proof", cls:"open", pct:total ? open/total*100 : 0},
    {title:"Proof-Critical", value:proof, label:"reviewer-important", cls:"proof", pct:total ? proof/total*100 : 0}
  ];

  cards.innerHTML = data.map(c => `
    <div class="card">
      <h3>${esc(c.title)}</h3>
      <div class="${c.cls}" style="font-size:28px;font-weight:bold;">${c.value}</div>
      <div class="small">${esc(c.label)}</div>
      <div class="bar"><div class="fill" style="width:${c.pct}%"></div></div>
    </div>
  `).join("");
}

function renderTable(list){
  const body = document.getElementById("engineBody");
  body.innerHTML = "";

  for(const e of list){
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="engine-title">${esc(e.name)}</span></td>
      <td>${esc(e.family)}</td>
      <td><span class="badge ${levelClass(e.level)}">${esc(e.level)}</span></td>
      <td><span class="${statusClass(e.status)}">${esc(e.status)}</span></td>
      <td>${esc(e.does)}</td>
      <td>${esc(e.next)}</td>
    `;
    body.appendChild(tr);
  }
}

function runAudit(){
  const byFamily = {};
  const byLevel = {};
  const byStatus = {};

  for(const e of ENGINES){
    byFamily[e.family] = (byFamily[e.family] || 0) + 1;
    byLevel[e.level] = (byLevel[e.level] || 0) + 1;
    byStatus[e.status] = (byStatus[e.status] || 0) + 1;
  }

  const openEngines = ENGINES.filter(e=>e.status==="OPEN");
  const proofCriticalOpen = ENGINES.filter(e=>e.status==="OPEN" && e.level==="Proof-Critical");

  const audit = {
    title:"Engine Room Audit",
    created:new Date().toISOString(),
    totalEngines:ENGINES.length,
    byFamily,
    byLevel,
    byStatus,
    mainWarning:"Toy and scanner engines are useful, but they are not proof.",
    biggestNeed: proofCriticalOpen.length
      ? "Close proof-critical open engines first."
      : "No proof-critical engines are marked open in this list.",
    proofCriticalOpen,
    allOpenEngines:openEngines,
    nextBestMoves:[
      "Separate toy engines from proof engines.",
      "Give every certificate engine a JSON witness.",
      "Give every proof-critical engine a written lemma.",
      "For Collatz, remove or fully prove quotient abstraction.",
      "For Goldbach, define the side-cover / survivor theorem clearly."
    ]
  };

  document.getElementById("auditOut").textContent = JSON.stringify(audit,null,2);
}

function exportJSON(){
  const packet = {
    title:"Engine Room Export",
    created:new Date().toISOString(),
    engines:ENGINES
  };

  const blob = new Blob([JSON.stringify(packet,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "engine_room_export.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function copySummary(){
  const pass = ENGINES.filter(e=>e.status==="PASS").length;
  const open = ENGINES.filter(e=>e.status==="OPEN").length;
  const proof = ENGINES.filter(e=>e.level==="Proof-Critical").length;

  const text =
`ENGINE ROOM SUMMARY

Total engines: ${ENGINES.length}
PASS: ${pass}
OPEN: ${open}
Proof-critical: ${proof}

Main families:
- Collatz Path
- Collatz Certificate
- Five Conjecture
- Goldbach
- Visual App

Main warning:
Toy/scanner engines are not proof. Certificate/proof-critical engines need exact witness rows and written lemmas.`;

  navigator.clipboard.writeText(text).then(()=>{
    alert("Summary copied.");
  });
}

function statusClass(s){

  if(s === "FAIL") return "fail";
  if(s === "OPEN") return "open";
  return "muted";
}

function levelClass(l){
  if(l === "Toy") return "toy";
  if(l === "Scanner") return "scan";
  if(l === "Certificate") return "cert";
  if(l === "Proof-Critical") return "proof";
  if(l === "Open") return "open";
  return "muted";
}

function esc(x){
  return String(x)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

render();
</script>
