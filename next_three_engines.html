<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><title>Next 3 Engines — Proof Workbench</title><meta name="viewport" content="width=device-width, initial-scale=1.0" /><style>:root{  --bg:#02060b;  --panel:#071522;  --line:#16425c;  --text:#e8f8ff;  --muted:#9bb5c7;  --cyan:#7ee7ff;  --green:#7dff9b;  --yellow:#ffd86b;  --red:#ff7373;  --orange:#ffae5d;  --purple:#c9a7ff;}*{box-sizing:border-box}body{  margin:0;  background:    radial-gradient(circle at 12% 0%, rgba(0,220,255,.16), transparent 32%),    radial-gradient(circle at 88% 12%, rgba(160,100,255,.12), transparent 30%),    linear-gradient(180deg,#02060b,#050b12,#010409);  color:var(--text);  font-family:Arial, Helvetica, sans-serif;}.wrap{  max-width:1200px;  margin:auto;  padding:14px;}h1{  color:var(--cyan);  margin:8px 0 4px;  font-size:26px;}.sub{  color:var(--muted);  font-size:13px;  margin-bottom:12px;}.panel{  background:rgba(7,21,34,.94);  border:1px solid var(--line);  border-radius:16px;  padding:14px;  margin-bottom:12px;  box-shadow:0 0 22px rgba(0,200,255,.08);}.controls{  display:flex;  flex-wrap:wrap;  gap:8px;  align-items:center;}input, button{  border:1px solid #1f6f94;  background:#020812;  color:var(--text);  padding:10px;  border-radius:10px;  font-size:14px;}button{  cursor:pointer;  background:#07344c;  font-weight:bold;}button:hover{background:#0b5174}.btn-main{  background:#075f7b;  border-color:#45dfff;}.grid3{  display:grid;  grid-template-columns:repeat(3,1fr);  gap:12px;}@media(max-width:900px){  .grid3{grid-template-columns:1fr}}.card{  background:#06131f;  border:1px solid #12384f;  border-radius:14px;  padding:12px;}.card h2{  margin:0 0 8px;  color:#bdf3ff;  font-size:17px;}.good{color:var(--green);font-weight:bold}.warn{color:var(--yellow);font-weight:bold}.bad{color:var(--red);font-weight:bold}.mid{color:var(--orange);font-weight:bold}.cyan{color:var(--cyan);font-weight:bold}.purple{color:var(--purple);font-weight:bold}.small{color:var(--muted);font-size:13px}table{  width:100%;  border-collapse:collapse;  font-size:13px;}td,th{  border-bottom:1px solid #12384f;  padding:8px;  text-align:left;  vertical-align:top;}th{color:#9be9ff}.scroll{  max-height:430px;  overflow:auto;  border:1px solid #102f44;  border-radius:12px;}pre{  background:#020812;  border:1px solid #12384f;  border-radius:12px;  padding:12px;  overflow:auto;  white-space:pre-wrap;  max-height:420px;  font-size:12px;}.badge{  display:inline-block;  border:1px solid #244e68;  border-radius:999px;  padding:4px 8px;  margin:2px;  font-size:12px;}.pass{color:var(--green)}.open{color:var(--yellow)}.fail{color:var(--red)}</style></head><body><div class="wrap"><h1>Next 3 Engines</h1><div class="sub">  One page. Three next moves: claim audit, certificate hash, and gap finder.</div><div class="panel">  <div class="controls">    <label>N:</label>    <input id="N" type="number" value="10000" min="100" max="250000" />    <label>Sample certificate text:</label>    <input id="certText" style="min-width:320px" value="Goldbach: 10000 = 59 + 9941" />    <button class="btn-main" onclick="runAll()">Run Next 3</button>    <button onclick="exportJSON()">Export JSON</button>    <button onclick="copyReviewer()">Copy Reviewer Summary</button>  </div></div><div class="grid3">  <div class="card">    <h2>1. Claim Audit</h2>    <div id="claimBox" class="small">Run audit...</div>  </div>  <div class="card">    <h2>2. Certificate Hash</h2>    <div id="hashBox" class="small">Run hash...</div>  </div>  <div class="card">    <h2>3. Gap Finder</h2>    <div id="gapBox" class="small">Run gap finder...</div>  </div></div><div class="panel">  <h2>Gap Table</h2>  <div class="scroll">    <table>      <thead>        <tr>          <th>Area</th>          <th>Status</th>          <th>Gap</th>          <th>Fix</th>        </tr>      </thead>      <tbody id="gapBody"></tbody>    </table>  </div></div><div class="panel">  <h2>Raw Packet</h2>  <pre id="rawOut">Run Next 3...</pre></div></div><script>let LAST_PACKET = null;const CLAIM_RULES = [  {    area:"Toy engines",    status:"PASS",    gap:"Toy labels are safe if they do not say proof.",    fix:"Keep BSD, P vs NP, and Riemann surface tests labeled toy/surface."  },  {    area:"Scanner engines",    status:"PASS",    gap:"Finite scan is evidence, not proof.",    fix:"Always show range N and say 'no surface failure up to N'."  },  {    area:"Certificate engines",    status:"OPEN",    gap:"Certificate rows need exact witness fields.",    fix:"Store input, rule, witness, checker result, and hash."  },  {    area:"Universal proof",    status:"OPEN",    gap:"Needs all-cases lemma, not only checked rows.",    fix:"Write the universal lemma separately from the scan."  }];const GAP_RULES = [  {    area:"Collatz quotient abstraction",    status:"OPEN",    gap:"A quotient key may hide proof-critical state.",    fix:"Use exact-state closure or prove quotient preserves valuation/descent state."  },  {    area:"Collatz packet universe",    status:"OPEN",    gap:"The packet needs a clear definition of what universe it covers.",    fix:"Write BASE_PACKET_UNIVERSE_COMPLETENESS.md."  },  {    area:"Collatz descent",    status:"PASS",    gap:"Affine descent rule is clear when gap > 0 and n > B.",    fix:"Keep integer B = (b + gap - 1) // gap."  },  {    area:"Goldbach side-cover",    status:"OPEN",    gap:"Need proof that composites cannot cover every survivor gap.",    fix:"Turn survivor gaps into a formal counting/covering lemma."  },  {    area:"Twin prime infinity",    status:"OPEN",    gap:"Finding many twin primes does not prove infinitely many.",    fix:"Need a theorem that forces new pairs beyond every bound."  },  {    area:"Riemann surface test",    status:"OPEN",    gap:"π(x) vs x/log(x) is too weak for RH.",    fix:"Use li(x), zeta zeros, and explicit error terms if exploring deeper."  },  {    area:"P vs NP toy",    status:"OPEN",    gap:"Subset-sum demo shows find/check gap, not P vs NP.",    fix:"Keep it as educational only."  },  {    area:"BSD toy curve",    status:"OPEN",    gap:"Integer points are not the BSD theorem.",    fix:"Separate elliptic curve demo from real rank/L-function claim."  }];function runAll(){  const N = Number(document.getElementById("N").value || 10000);  const certText = document.getElementById("certText").value || "";  const packet = {    title:"Next 3 Engines Packet",    created:new Date().toISOString(),    N,    engines:[      runClaimAudit(N),      {        name:"Certificate Hash Engine",        result:"PENDING_ASYNC_HASH",        input:certText      },      runGapFinder()    ],    warning:"This organizes proof work. It does not prove the conjectures."  };  LAST_PACKET = packet;  renderClaim(packet.engines[0]);  renderGap(packet.engines[2]);  renderRaw(packet);  makeHash(certText).then(hash => {    packet.engines[1] = {      name:"Certificate Hash Engine",      status:"PASS",      input:certText,      hash,      meaning:"This creates a fingerprint for a certificate row so it can be checked later."    };    LAST_PACKET = packet;    renderHash(packet.engines[1]);    renderRaw(packet);  }).catch(err => {    packet.engines[1] = {      name:"Certificate Hash Engine",      status:"FAIL",      error:String(err)    };    LAST_PACKET = packet;    renderHash(packet.engines[1]);    renderRaw(packet);  });}function runClaimAudit(N){  const pass = CLAIM_RULES.filter(x => x.status === "PASS").length;  const open = CLAIM_RULES.filter(x => x.status === "OPEN").length;  return {    name:"Claim Audit Engine",    status:open ? "OPEN" : "PASS",    N,    rules:CLAIM_RULES,    safeClaim:`No surface failure up to N=${N}. This is computational evidence, not proof.`,    blockedClaim:"Do not say solved, proven, accepted, or universal unless a complete proof survives review.",    summary:`PASS rules: ${pass}. OPEN rules: ${open}.`  };}function runGapFinder(){  const pass = GAP_RULES.filter(x => x.status === "PASS").length;  const open = GAP_RULES.filter(x => x.status === "OPEN").length;  return {    name:"Gap Finder Engine",    status:open ? "OPEN" : "PASS",    rules:GAP_RULES,    summary:`PASS gaps closed: ${pass}. OPEN gaps remaining: ${open}.`  };}async function makeHash(text){  const enc = new TextEncoder();  const data = enc.encode(text);  const hashBuffer = await crypto.subtle.digest("SHA-256", data);  const arr = Array.from(new Uint8Array(hashBuffer));  return arr.map(b => b.toString(16).padStart(2,"0")).join("");}function renderClaim(engine){  document.getElementById("claimBox").innerHTML = `    <div>Status: <span class="${cls(engine.status)}">${engine.status}</span></div>    <p><b>Safe:</b> ${esc(engine.safeClaim)}</p>    <p><b>Blocked:</b> ${esc(engine.blockedClaim)}</p>    <p>${esc(engine.summary)}</p>  `;}function renderHash(engine){  if(engine.status === "PASS"){    document.getElementById("hashBox").innerHTML = `      <div>Status: <span class="pass">PASS</span></div>      <p><b>Input:</b> ${esc(engine.input)}</p>      <p><b>SHA-256:</b></p>      <pre>${esc(engine.hash)}</pre>    `;  } else {    document.getElementById("hashBox").innerHTML = `      <div>Status: <span class="fail">FAIL</span></div>      <p>${esc(engine.error || "Hash failed.")}</p>    `;  }}function renderGap(engine){  document.getElementById("gapBox").innerHTML = `    <div>Status: <span class="${cls(engine.status)}">${engine.status}</span></div>    <p>${esc(engine.summary)}</p>    <p class="small">Main target: close OPEN gaps one at a time.</p>  `;  const body = document.getElementById("gapBody");  body.innerHTML = "";  for(const g of engine.rules){    const tr = document.createElement("tr");    tr.innerHTML = `      <td>${esc(g.area)}</td>      <td><span class="${cls(g.status)}">${esc(g.status)}</span></td>      <td>${esc(g.gap)}</td>      <td>${esc(g.fix)}</td>    `;    body.appendChild(tr);  }}function renderRaw(packet){  document.getElementById("rawOut").textContent = JSON.stringify(packet,null,2);}function exportJSON(){  if(!LAST_PACKET){    alert("Run Next 3 first.");    return;  }  const blob = new Blob([JSON.stringify(LAST_PACKET,null,2)], {    type:"application/json"  });  const a = document.createElement("a");  a.href = URL.createObjectURL(blob);  a.download = "next_three_engines_packet.json";  a.click();  URL.revokeObjectURL(a.href);}function copyReviewer(){  const N = Number(document.getElementById("N").value || 10000);  const text =`Reviewer-safe summary:I built a workbench that separates three things:1. Claim audit — what the app is allowed to say.2. Certificate hash — a SHA-256 fingerprint for certificate rows.3. Gap finder — a list of remaining proof gaps.Current safe claim:No surface failure up to N=${N}. This is computational evidence, not proof.Main open gaps:- Collatz quotient abstraction must preserve exact proof-critical state or be removed.- Collatz packet universe needs a precise completeness writeup.- Goldbach side-cover/survivor gap needs a real universal counting theorem.`;  navigator.clipboard.writeText(text).then(()=>{    alert("Reviewer summary copied.");  });}function cls(s){  if(s === "PASS") return "pass";  if(s === "FAIL") return "fail";  if(s === "OPEN") return "open";  return "";}function esc(x){  return String(x)    .replaceAll("&","&amp;")    .replaceAll("<","&lt;")    .replaceAll(">","&gt;");}runAll();</script></body></html>
